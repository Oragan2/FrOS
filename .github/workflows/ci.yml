name: CI
on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-i686-linux-gnu \
            nasm \
            qemu-system-x86 \
            python3

      - name: Build
        run: make ci CROSS=i686-linux-gnu

      - name: Show boot log
        if: always()
        run: cat boot.log

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: boot-log
          path: boot.log
